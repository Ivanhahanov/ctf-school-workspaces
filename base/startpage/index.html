<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Рабочая станция</title>
<style>
  :root{ --bg:#1b1d23; --panel:#23262e; --line:#31353f; --fg:#e6e6e6; --muted:#9aa0aa; --acc:#7cc36e; --acc2:#5aa0e0; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:radial-gradient(1200px 600px at 70% -10%, #262a33 0%, var(--bg) 60%);
       color:var(--fg);font:15px/1.6 "Hack",monospace,system-ui;display:flex;align-items:center;justify-content:center}
  .wrap{width:min(720px,92vw);padding:2.2rem}
  h1{font-size:1.4rem;margin:0 0 .3rem;color:var(--fg)}
  .sub{color:var(--muted);margin:0 0 1.8rem;font-size:.9rem}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:1.1rem 1.4rem;margin-bottom:1rem}
  .card h2{font-size:.9rem;margin:.1rem 0 .7rem;color:var(--acc);text-transform:uppercase;letter-spacing:.06em}
  ul{margin:.2rem 0;padding-left:1.2rem}
  li{margin:.3rem 0}
  kbd{background:#10131a;border:1px solid var(--line);border-bottom-width:2px;border-radius:6px;padding:.05rem .4rem;font-size:.85em}
  code{background:#10131a;border-radius:5px;padding:.1rem .4rem}
</style>
</head>
<body>
  <div class="wrap">
    <h1>Рабочая станция</h1>
    <p class="sub">Изолированное окружение без доступа в интернет.</p>

    <div class="card">
      <h2>Буфер обмена</h2>
      <ul>
        <li>Скопировать из окна: выделите текст, затем нажмите кнопку <b>📋</b> на боковой панели слева.</li>
        <li>Вставка в окне: <kbd>Ctrl</kbd>+<kbd>V</kbd></li>
        <li>Вставка в терминале: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd></li>
      </ul>
    </div>

    <div class="card">
      <h2>Раскладка клавиатуры</h2>
      <ul>
        <li>Переключение EN / RU: <kbd>Alt</kbd>+<kbd>Shift</kbd></li>
      </ul>
    </div>
  </div>
</body>
</html>
